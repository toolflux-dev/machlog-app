<!DOCTYPE html>
<html lang="en" id="root">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#012B42">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<title>TOOLFLUX — Machining Log</title>
<style>
/* ═══════════════════════════════════════════════
   TOOLFLUX MACHINING LOG v3
   Component-centric. Insert-lifecycle aware.
   Engineering ledger. Light only.
   ═══════════════════════════════════════════════ */
:root {
  --teal:    #0097B2;
  --teal-d:  #00748a;
  --navy:    #012B42;
  --ink:     #08141a;
  --T:       #0d1e26;
  --mut:     #5a7282;
  --W:       #FEFFFE;
  --off:     #f2f5f7;
  --off2:    #e4eaed;
  --rule:    #ccd4d8;
  --rule2:   #a8b6bc;
  --teal-tint: #e5f4f7;
  --warn:    #b06000;
  --warn-bg: #fff3e0;
  --bad:     #a62d1e;
  --bad-bg:  #fdf0ee;
  --ok:      #1a6e50;
  --ok-bg:   #eaf4ef;
  --mono: ui-monospace,'Cascadia Mono',Consolas,'Courier New',monospace;
  --r: 1px;
  --sh: 0 1px 6px rgba(0,0,0,.09);
}
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0 }
html { -webkit-text-size-adjust: 100% }
body {
  background: var(--off);
  color: var(--T);
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  font-size: .875rem;
  line-height: 1.5;
  min-height: 100vh;
}
a { color: var(--teal); text-decoration: none }
button { font-family: inherit; cursor: pointer }
input, select, textarea { font-family: inherit; font-size: .875rem; color: var(--T); background: var(--W) }
:focus-visible { outline: 2px solid var(--teal); outline-offset: 2px }
::selection { background: var(--teal); color: #fff }
@media (prefers-reduced-motion: reduce) { *,*::before,*::after { transition-duration: .01ms !important } }

/* ─── util ─── */
.lbl { font-size: .58rem; font-weight: 700; letter-spacing: .22em; text-transform: uppercase; color: var(--mut) }
.lbl-t { color: var(--teal) }
.mono { font-family: var(--mono); font-variant-numeric: tabular-nums }
.num  { font-variant-numeric: tabular-nums }
.muted { color: var(--mut) }
.small { font-size: .75rem }
.req { color: var(--bad) }

/* ─── header ─── */
header.bar {
  position: sticky; top: 0; z-index: 600;
  background: var(--W);
  border-bottom: 2px solid var(--navy);
  box-shadow: var(--sh);
}
.bar-top {
  display: flex; align-items: center; gap: .9rem;
  padding: .6rem 1.4rem .5rem;
}
.bar-logo img { height: 24px; display: block }
.bar-sep { width: 1px; height: 20px; background: var(--rule2); flex-shrink: 0 }
.bar-app {
  font-size: .58rem; font-weight: 800; letter-spacing: .3em;
  text-transform: uppercase; color: var(--navy); white-space: nowrap;
}
.bar-crumb {
  font-family: var(--mono);
  font-size: .72rem; font-weight: 700;
  color: var(--teal); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.bar-right { margin-left: auto; display: flex; align-items: center; gap: .65rem }
.bar-clock { text-align: right; line-height: 1.2 }
.bar-clock .t { font-family: var(--mono); font-size: .88rem; font-weight: 600; color: var(--navy) }
.bar-clock .d { font-size: .57rem; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: var(--mut) }
.crumb-back {
  font-size: .6rem; font-weight: 700; letter-spacing: .14em; text-transform: uppercase;
  color: var(--mut); border: 1px solid var(--rule2); border-radius: var(--r);
  background: none; padding: .3rem .6rem; min-height: 30px; transition: all .15s;
}
.crumb-back:hover { color: var(--navy); border-color: var(--navy) }
.tabs { display: flex; padding: 0 1.2rem; gap: 0; overflow-x: auto; scrollbar-width: none }
.tabs::-webkit-scrollbar { display: none }
.tab {
  appearance: none; border: 0; background: none;
  padding: .52rem .82rem .48rem;
  font-size: .6rem; font-weight: 700; letter-spacing: .15em; text-transform: uppercase;
  color: var(--mut); white-space: nowrap;
  border-bottom: 2px solid transparent; transition: color .15s;
}
.tab:hover { color: var(--navy) }
.tab[aria-selected=true] { color: var(--navy); border-bottom-color: var(--teal) }
.tab .n {
  display: inline-block; min-width: 1.1rem; padding: 0 .2rem; margin-left: .28rem;
  font-family: var(--mono); font-size: .56rem; line-height: 1.55;
  background: var(--teal); color: #fff; border-radius: 1px; letter-spacing: 0;
}

/* ─── layout ─── */
main { max-width: 1280px; margin: 0 auto; padding: 1.2rem 1.4rem 6rem }
.panel { background: var(--W); border: 1px solid var(--rule); border-radius: var(--r); margin-bottom: 1.1rem; overflow: hidden }
.panel-hd {
  display: flex; align-items: center; gap: .8rem; flex-wrap: wrap;
  padding: .65rem 1rem .55rem;
  border-bottom: 1px solid var(--rule);
  background: var(--off);
}
.panel-hd .hr { flex: 1; height: 1px; background: var(--rule) }
.panel-bd { padding: .85rem 1rem }

/* ─── buttons ─── */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: .35rem;
  border: 1px solid transparent; border-radius: var(--r);
  padding: .55rem 1rem;
  font-size: .6rem; font-weight: 700; letter-spacing: .14em; text-transform: uppercase;
  transition: background .14s, color .14s, border-color .14s;
  min-height: 36px; white-space: nowrap;
}
.btn-pri  { background: var(--navy); color: #fff; border-color: var(--navy) }
.btn-pri:hover  { background: var(--teal-d); border-color: var(--teal-d) }
.btn-teal { background: var(--teal); color: #fff; border-color: var(--teal) }
.btn-teal:hover { background: var(--teal-d); border-color: var(--teal-d) }
.btn-ol   { background: var(--W); color: var(--navy); border-color: var(--navy) }
.btn-ol:hover   { background: var(--navy); color: #fff }
.btn-ghost { background: none; color: var(--mut); border-color: var(--rule2) }
.btn-ghost:hover { color: var(--navy); border-color: var(--navy) }
.btn-bad  { background: var(--W); color: var(--bad); border-color: var(--bad) }
.btn-bad:hover  { background: var(--bad); color: #fff }
.btn-ok   { background: var(--ok); color: #fff; border-color: var(--ok) }
.btn-ok:hover   { filter: brightness(1.1) }
.btn-lg   { min-height: 46px; padding: .7rem 1.3rem; font-size: .64rem }
.btn:disabled { opacity: .38; cursor: not-allowed }

/* ─── forms ─── */
.fgrid { display: grid; gap: .8rem .9rem; grid-template-columns: repeat(auto-fit, minmax(150px,1fr)) }
.field label, .field .flbl {
  display: block; margin-bottom: .25rem;
  font-size: .57rem; font-weight: 700; letter-spacing: .2em; text-transform: uppercase; color: var(--mut);
}
.field input, .field select, .field textarea {
  width: 100%; border: 1px solid var(--rule2); border-radius: var(--r);
  padding: .5rem .58rem; min-height: 38px;
  background: var(--W); color: var(--T); transition: border-color .14s;
}
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--teal); outline: none }
.field textarea { min-height: 64px; resize: vertical }
.hint { margin-top: .22rem; font-size: .67rem; color: var(--mut) }

/* ─── job hero ─── */
.job-hero {
  background: var(--navy); color: var(--W);
  padding: 1.2rem 1.4rem 1rem;
  border-bottom: 2px solid var(--teal);
}
.hero-top { display: flex; align-items: flex-start; gap: 1.5rem; flex-wrap: wrap }
.hero-main { flex: 1; min-width: 180px }
.hero-code {
  font-family: var(--mono);
  font-size: 1.55rem; font-weight: 700; letter-spacing: .06em;
  color: #fff; line-height: 1;
}
.hero-desc { font-size: .78rem; color: rgba(255,255,255,.65); margin-top: .3rem }
.hero-meta { font-size: .62rem; color: rgba(255,255,255,.45); margin-top: .18rem; letter-spacing: .04em }
.hero-count-wrap { text-align: right; flex-shrink: 0 }
.hero-num {
  font-family: var(--mono); font-size: 3.2rem; font-weight: 700;
  color: #fff; line-height: 1; font-variant-numeric: tabular-nums;
}
.hero-num-lbl { font-size: .58rem; font-weight: 700; letter-spacing: .22em; text-transform: uppercase; color: rgba(255,255,255,.5); margin-top: .25rem }
.hero-acts { display: flex; gap: .55rem; flex-wrap: wrap; margin-top: .85rem }
.hero-acts .btn-teal { background: var(--teal); color: #fff }
.hero-acts .btn-ghost { color: rgba(255,255,255,.6); border-color: rgba(255,255,255,.25) }
.hero-acts .btn-ghost:hover { color: #fff; border-color: #fff }

/* ─── station strip ─── */
.station-scroll { overflow-x: auto; padding: .85rem 1rem .9rem; display: flex; gap: .65rem; scrollbar-width: thin }
.station-scroll::-webkit-scrollbar { height: 4px }
.station-scroll::-webkit-scrollbar-thumb { background: var(--rule2); border-radius: 2px }
.station-tile {
  flex-shrink: 0; width: 158px;
  border: 1.5px solid var(--rule2);
  border-radius: var(--r);
  background: var(--W);
  padding: .6rem .7rem .55rem;
  cursor: pointer; transition: border-color .14s, box-shadow .14s;
  position: relative;
}
.station-tile:hover { border-color: var(--teal); box-shadow: 0 2px 8px rgba(0,151,178,.12) }
.station-tile.warn-st { border-color: var(--warn); }
.station-tile.bad-st  { border-color: var(--bad); }
.st-type {
  font-size: .52rem; font-weight: 800; letter-spacing: .14em; text-transform: uppercase;
  padding: .15rem .4rem; border-radius: var(--r); border: 1px solid;
  display: inline-block; margin-bottom: .4rem;
}
.st-name { font-size: .78rem; font-weight: 700; color: var(--navy); line-height: 1.25; margin-bottom: .1rem }
.st-sub  { font-size: .62rem; color: var(--mut); font-family: var(--mono); margin-bottom: .42rem }
.pip-row { display: flex; gap: 3px; flex-wrap: wrap; margin-bottom: .4rem }
.pip { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; transition: background .14s }
.pip.done    { background: var(--navy) }
.pip.current { background: var(--teal) }
.pip.broken  { background: var(--bad) }
.pip.empty   { background: transparent; border: 1.5px solid var(--rule2) }
.st-corner-lbl { font-size: .64rem; font-weight: 600; color: var(--navy); font-family: var(--mono) }
.st-corner-sub { font-size: .6rem; color: var(--mut) }
.no-insert-lbl { font-size: .66rem; color: var(--mut); font-style: italic; padding: .3rem 0 }
.add-tile {
  flex-shrink: 0; width: 100px;
  border: 1.5px dashed var(--rule2);
  border-radius: var(--r);
  background: none;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: .35rem; cursor: pointer; transition: border-color .14s, color .14s;
  color: var(--mut); font-size: .6rem; font-weight: 700; letter-spacing: .12em; text-transform: uppercase;
  padding: .6rem;
}
.add-tile:hover { border-color: var(--teal); color: var(--teal) }
.add-tile .plus { font-size: 1.4rem; font-weight: 300; line-height: 1 }

/* ─── log production form ─── */
.log-form-wrap {
  background: var(--teal-tint);
  border: 1.5px solid var(--teal);
  border-radius: var(--r);
  margin-bottom: 1.1rem;
  overflow: hidden;
}
.log-form-hd {
  padding: .65rem 1rem .55rem;
  background: var(--teal);
  display: flex; align-items: center; gap: .8rem;
}
.log-form-hd .lbl { color: rgba(255,255,255,.75) }
.log-form-hd .title { font-size: .75rem; font-weight: 700; color: #fff }
.log-form-bd { padding: .9rem 1rem 1rem }
.qty-row { display: flex; align-items: center; gap: .5rem; margin-bottom: .9rem }
.qty-inp {
  font-family: var(--mono);
  font-size: 2rem; font-weight: 700;
  width: 130px; min-height: 56px;
  border: 2px solid var(--navy); border-radius: var(--r);
  padding: .3rem .6rem; text-align: center; color: var(--navy);
}
.qty-inp:focus { border-color: var(--teal); outline: none }
.qty-adj {
  border: 1px solid var(--rule2); border-radius: var(--r);
  background: var(--W); color: var(--navy);
  font-size: .68rem; font-weight: 700;
  padding: .3rem .55rem; min-height: 34px;
  transition: all .12s;
}
.qty-adj:hover { background: var(--navy); color: #fff; border-color: var(--navy) }
.ev-station-list { display: flex; flex-direction: column; gap: .45rem; margin: .75rem 0 }
.ev-station-row {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: .45rem .7rem; align-items: center;
  padding: .5rem .65rem;
  background: var(--W); border: 1px solid var(--rule); border-radius: var(--r);
}
.ev-st-name { font-size: .75rem; font-weight: 700; color: var(--navy); line-height: 1.2 }
.ev-st-sub  { font-size: .62rem; color: var(--mut); grid-column: 1 }

/* ─── production log table ─── */
.log-tbl-wrap { overflow-x: auto }
.log-tbl {
  width: 100%; border-collapse: collapse;
  font-size: .78rem;
}
.log-tbl th {
  font-size: .57rem; font-weight: 700; letter-spacing: .18em; text-transform: uppercase;
  color: var(--mut); text-align: left;
  padding: .45rem .75rem;
  background: var(--off); border-bottom: 1.5px solid var(--rule2);
  white-space: nowrap;
}
.log-tbl td {
  padding: .55rem .75rem;
  border-bottom: 1px solid var(--rule);
  font-variant-numeric: tabular-nums; vertical-align: top;
}
.log-tbl tr:last-child td { border-bottom: 0 }
.log-tbl .qty-cell { font-family: var(--mono); font-size: .9rem; font-weight: 700; color: var(--navy) }
.log-tbl .ts-cell  { font-family: var(--mono); font-size: .72rem; color: var(--mut); white-space: nowrap }
.btn-icon-sm { background: none; border: 1px solid var(--rule2); border-radius: 4px; padding: .15rem .4rem; cursor: pointer; color: var(--mut); font-size: .8rem; line-height: 1; }
.btn-icon-sm:hover { background: var(--off2); color: var(--navy); }
.btn-sm { min-height: 30px; padding: .3rem .7rem; font-size: .58rem }
.team-list { display: flex; flex-direction: column; gap: .5rem }
.team-row { display: flex; align-items: center; gap: .5rem; padding: .5rem .65rem; background: var(--off); border: 1px solid var(--rule); border-radius: var(--r); flex-wrap: wrap }
.team-name { font-weight: 700; color: var(--navy); font-size: .82rem; flex: 1; min-width: 80px }
.ops-pipeline { display: flex; align-items: center; background: var(--off); border: 1px solid var(--rule); border-radius: var(--r); padding: .5rem .75rem; margin-top: .85rem; margin-bottom: 0; gap: 0; overflow-x: auto }
.ops-steps { display: flex; align-items: center; gap: 0; flex: 1; min-width: 0 }
.op-step { display: flex; flex-direction: column; align-items: center; cursor: pointer; padding: .35rem .65rem; border-radius: 8px; border: 2px solid transparent; transition: background .15s, border-color .15s; min-width: 80px }
.op-step:hover { background: var(--srf) }
.op-step.active { background: var(--srf); border-color: var(--teal) }
.op-step-name { font-size: .8rem; font-weight: 700; color: var(--navy) }
.op-step-stat { font-size: .72rem; color: var(--mut); text-align: center; margin-top: .1rem }
.op-wip { font-size: .68rem; color: #e29a1a; font-weight: 600; margin-top: .1rem }
.op-arrow { font-size: 1rem; color: var(--mut); padding: 0 .3rem; flex-shrink: 0 }
/* Inventory */
.inv-tbl { width: 100%; border-collapse: collapse; font-size: .78rem }
.inv-tbl th { text-align: left; font-size: .65rem; font-weight: 700; letter-spacing: .08em; color: var(--mut); text-transform: uppercase; padding: .3rem .5rem; border-bottom: 1px solid var(--rule) }
.inv-tbl td { padding: .35rem .5rem; border-bottom: 1px solid var(--rule2) }
.inv-tbl tr:last-child td { border-bottom: 0 }
.ev-chips { display: flex; flex-wrap: wrap; gap: .3rem; margin-top: .22rem }
.ev-chip {
  font-size: .55rem; font-weight: 700; letter-spacing: .06em;
  padding: .1rem .38rem; border-radius: 1px;
}
.ev-chip.index   { background: var(--teal-tint); color: var(--teal-d); border: 1px solid var(--teal) }
.ev-chip.replace { background: var(--off2); color: var(--navy); border: 1px solid var(--rule2) }
.ev-chip.broken  { background: var(--bad-bg); color: var(--bad); border: 1px solid var(--bad) }

/* ─── station detail ─── */
.set-block {
  border: 1px solid var(--rule);
  border-radius: var(--r);
  margin-bottom: .75rem;
  overflow: hidden;
}
.set-hd {
  display: flex; align-items: center; gap: .8rem;
  padding: .55rem .85rem .5rem;
  background: var(--off); border-bottom: 1px solid var(--rule);
}
.set-badge {
  font-family: var(--mono); font-size: .66rem; font-weight: 700;
  background: var(--navy); color: #fff;
  padding: .18rem .5rem; border-radius: var(--r);
}
.set-badge.spent  { background: var(--ok) }
.set-badge.broken { background: var(--bad) }
.set-badge.active { background: var(--teal) }
.corner-tbl { width: 100%; border-collapse: collapse; font-size: .78rem }
.corner-tbl th {
  font-size: .55rem; font-weight: 700; letter-spacing: .16em; text-transform: uppercase;
  color: var(--mut); text-align: left; padding: .4rem .75rem;
  background: var(--off); border-bottom: 1px solid var(--rule);
}
.corner-tbl td { padding: .5rem .75rem; border-bottom: 1px solid var(--rule); font-variant-numeric: tabular-nums }
.corner-tbl tr:last-child td { border-bottom: 0 }
.corner-tbl .active-row { background: oklch(0.97 0.008 215) }
.corner-tbl .broken-row { background: var(--bad-bg) }

/* ─── jobs list ─── */
.jobs-hd { display: flex; align-items: baseline; gap: 1rem; margin-bottom: .85rem }
.jobs-hd h2 { font-size: 1.05rem; font-weight: 800; color: var(--navy) }
.job-row {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: .5rem 1.2rem;
  align-items: start;
  padding: .8rem 1rem;
  border-bottom: 1px solid var(--rule);
  cursor: pointer; transition: background .13s;
}
.job-row:last-child { border-bottom: 0 }
.job-row:hover { background: var(--off) }
.job-code { font-family: var(--mono); font-size: .9rem; font-weight: 700; color: var(--navy) }
.job-desc { font-size: .73rem; color: var(--mut); margin-top: .1rem }
.job-meta { font-size: .63rem; color: var(--mut); margin-top: .22rem }
.job-count { font-family: var(--mono); font-size: 1.25rem; font-weight: 700; color: var(--navy); text-align: right }
.job-count-lbl { font-size: .56rem; font-weight: 700; letter-spacing: .16em; text-transform: uppercase; color: var(--mut); text-align: right }
.job-health { display: flex; gap: .3rem; flex-wrap: wrap; margin-top: .35rem }
.health-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--ok) }
.health-dot.warn { background: var(--warn) }
.health-dot.bad  { background: var(--bad) }
.health-dot.empty { background: transparent; border: 1.5px solid var(--rule2) }
.job-status-badge {
  display: inline-block;
  font-size: .52rem; font-weight: 800; letter-spacing: .12em; text-transform: uppercase;
  padding: .15rem .42rem; border-radius: var(--r); border: 1px solid;
  margin-left: .5rem;
}
.job-status-badge.active   { background: var(--ok-bg);   color: var(--ok);   border-color: var(--ok) }
.job-status-badge.paused   { background: var(--warn-bg);  color: var(--warn);  border-color: var(--warn) }
.job-status-badge.complete { background: var(--off2);     color: var(--mut);   border-color: var(--rule2) }

/* ─── op type badges ─── */
.badge-op {
  font-size: .52rem; font-weight: 800; letter-spacing: .1em; text-transform: uppercase;
  padding: .15rem .4rem; border-radius: var(--r); border: 1px solid;
  white-space: nowrap;
}
.op-turn  { background: #e8f3fa; color: #0a3a5c; border-color: #7ab0cc }
.op-mill  { background: #eef7ee; color: #0d4a1a; border-color: #7ab87a }
.op-drill { background: #fff3e5; color: #6b3400; border-color: #d4813a }
.op-tap   { background: #f5eef8; color: #4a1570; border-color: #a97dc0 }
.op-bore  { background: #fef7e5; color: #5a3800; border-color: #c8a83a }
.op-ream  { background: #f0fafa; color: #005e6e; border-color: #3ab0c0 }
.op-other { background: var(--off2); color: var(--mut); border-color: var(--rule2) }

/* ─── stat strip ─── */
.stat-strip { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px,1fr)); border-top: 1px solid var(--rule) }
.s-stat { padding: .75rem 1rem .65rem; border-right: 1px solid var(--rule); border-bottom: 1px solid var(--rule) }
.s-stat:last-child { border-right: 0 }
.s-val { font-family: var(--mono); font-size: 1.55rem; font-weight: 700; color: var(--navy); line-height: 1 }
.s-val.ok-c  { color: var(--ok) }
.s-val.warn-c { color: var(--warn) }
.s-val.bad-c  { color: var(--bad) }
.s-sub { font-size: .63rem; color: var(--mut); margin-top: .15rem }
.s-unit { font-size: .65rem; font-weight: 400; color: var(--mut) }

/* ─── toasts ─── */
#toasts {
  position: fixed; bottom: 1.2rem; left: 50%; transform: translateX(-50%);
  z-index: 900; display: flex; flex-direction: column; gap: .45rem;
  align-items: center; pointer-events: none;
}
.toast {
  background: var(--navy); color: #fff;
  border-radius: var(--r); padding: .6rem 1rem;
  font-size: .74rem; font-weight: 500;
  box-shadow: 0 4px 20px rgba(0,0,0,.2);
  animation: tin .16s ease-out;
  max-width: min(92vw, 460px);
}
.toast.ok-t  { background: var(--ok) }
.toast.bad-t { background: var(--bad) }
@keyframes tin { from { opacity: 0; transform: translateY(6px) } to { opacity: 1; transform: none } }

/* ─── trial bar ─── */
#trial-bar:empty { display: none }
.trial-bar {
  background: #fffbe6; border-bottom: 1px solid #e6c840;
  padding: .45rem 1.4rem; display: flex; align-items: center; gap: .75rem;
  font-size: .75rem; color: #7a5800;
}
.trial-bar-txt { flex: 1 }
.btn-trial-sub {
  background: #e6b800; color: #1a1200; border: none;
  padding: .28rem .8rem; font-size: .72rem; font-weight: 700;
  border-radius: var(--r); cursor: pointer; white-space: nowrap;
}
.btn-trial-sub:hover { background: #d4a800 }

/* ─── paywall ─── */
.paywall-wrap {
  display: flex; align-items: center; justify-content: center;
  min-height: 75vh; padding: 2rem 1rem;
}
.paywall-card {
  background: var(--W); border: 1px solid var(--rule);
  border-radius: 4px; box-shadow: 0 4px 24px rgba(0,0,0,.08);
  max-width: 420px; width: 100%; padding: 2.5rem 2rem;
  text-align: center;
}
.paywall-logo {
  font-size: .65rem; font-weight: 800; letter-spacing: .3em;
  text-transform: uppercase; color: var(--teal); margin-bottom: 1.5rem;
}
.paywall-title {
  font-size: 1.25rem; font-weight: 800; color: var(--navy);
  margin-bottom: .5rem; line-height: 1.2;
}
.paywall-sub {
  font-size: .82rem; color: var(--mut); margin-bottom: 1.5rem;
}
.sub-benefits {
  text-align: left; margin-bottom: 1.75rem;
  display: flex; flex-direction: column; gap: .45rem;
}
.sub-benefit {
  font-size: .8rem; color: var(--T);
  display: flex; align-items: center; gap: .5rem;
}
.sub-benefit::before {
  content: ''; width: 14px; height: 14px; flex-shrink: 0;
  background: var(--ok); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}
.paywall-sub-btn {
  width: 100%; margin-bottom: 1.5rem; padding: .75rem;
  font-size: .9rem;
}
.paywall-activate {
  border-top: 1px solid var(--rule); padding-top: 1.2rem;
  text-align: left;
}
.paywall-activate-label {
  font-size: .7rem; font-weight: 700; letter-spacing: .1em;
  text-transform: uppercase; color: var(--mut); margin-bottom: .4rem;
}
.paywall-price {
  font-size: 1.6rem; font-weight: 800; color: var(--navy);
  margin-bottom: .2rem;
}
.paywall-price span { font-size: .8rem; font-weight: 400; color: var(--mut) }

/* ─── anomaly flag ─── */
.anomaly-flag {
  display: flex; gap: .55rem; align-items: flex-start;
  padding: .55rem .75rem;
  background: var(--bad-bg); border: 1px solid var(--bad);
  border-radius: var(--r); font-size: .73rem;
  margin-bottom: .45rem;
}
.anomaly-flag .ic { color: var(--bad); font-size: .85rem; flex-shrink: 0; margin-top: .05rem }
.anomaly-flag .msg { color: var(--bad); font-weight: 500 }
.anomaly-flag .detail { color: var(--mut); font-size: .67rem; margin-top: .1rem }

/* ─── report ─── */
#print-area { display: none }
.report {
  background: #fff; color: #111;
  width: min(100%, 210mm); margin: 0 auto;
  padding: 10mm 11mm; font-size: 9pt; line-height: 1.4;
  border: 1px solid var(--rule); box-shadow: 0 4px 24px rgba(0,0,0,.08);
}
.report * { color: #111 !important; background: #fff !important; box-shadow: none !important }
.rpt-hd { display: flex; align-items: flex-start; gap: 5mm; border-bottom: 2.5px solid #111; padding-bottom: 3mm; margin-bottom: 3.5mm }
.rpt-hd img { height: 8mm; display: block }
.rpt-hd-info { flex: 1 }
.rpt-hd-info .co { font-size: 13pt; font-weight: 800 }
.rpt-hd-info .meta { font-size: 7pt; color: #444; margin-top: .8mm }
.rpt-hd-right { text-align: right }
.rpt-hd-right .title { font-size: 10pt; font-weight: 800; letter-spacing: .06em; text-transform: uppercase }
.rpt-hd-right .sub { font-size: 5.5pt; font-weight: 700; letter-spacing: .2em; text-transform: uppercase; color: #555 }
.rpt-band { display: grid; grid-template-columns: repeat(4,1fr); border: 1px solid #333; border-top: 0; margin-bottom: 4.5mm }
.rpt-band > div { padding: 1.2mm 2mm; border-right: 1px solid #333 }
.rpt-band > div:last-child { border-right: 0 }
.rpt-band .k { font-size: 5pt; font-weight: 700; letter-spacing: .18em; text-transform: uppercase; color: #555 }
.rpt-band .v { font-size: 9.5pt; font-weight: 700 }
.rpt-sec { margin-bottom: 4.5mm; break-inside: avoid }
.rpt-sec-hd { display: flex; align-items: baseline; gap: 2.5mm; margin-bottom: 1.8mm }
.rpt-sec-hd .s { font-size: 6.5pt; font-weight: 800; letter-spacing: .2em; text-transform: uppercase }
.rpt-sec-hd .r { flex: 1; border-bottom: 1.5px solid #111 }
table.rt { width: 100%; border-collapse: collapse; margin-bottom: 1mm }
.rt th { border: 1px solid #333; padding: 1.2mm 1.8mm; font-size: 5pt; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; background: #f0f0f0; text-align: left }
.rt td { border: 1px solid #ccc; padding: 1.3mm 1.8mm; font-size: 8pt; font-variant-numeric: tabular-nums; vertical-align: top }
.rt td.n { text-align: right }
.rt tr.sub td { background: #f6f6f6; font-weight: 600 }
.rt tr.flag td { background: #fff0ee }
.rpt-foot { display: flex; justify-content: space-between; align-items: flex-end; border-top: 1px solid #999; padding-top: 2mm; margin-top: 4mm }
.rpt-sign { flex: 1; max-width: 50mm; border-top: 1px solid #111; margin-top: 5mm; padding-top: 1mm; font-size: 6pt; letter-spacing: .14em; text-transform: uppercase; color: #444 }
.rpt-gen { font-size: 5.5pt; color: #666; text-align: right }
@media print {
  @page { size: A4 portrait; margin: 6mm }
  body { background: #fff !important }
  #app { display: none !important }
  #print-area { display: block !important }
  .report { border: 0; box-shadow: none; width: 100%; padding: 2mm 0; margin: 0 }
  .rpt-sec { break-inside: avoid }
}

/* ─── utility extras ─── */
.n { text-align: right; font-variant-numeric: tabular-nums }
.ok-c  { color: var(--ok) }
.bad-c { color: var(--bad) }
.s-val.muted { color: var(--mut) !important; font-size: .85rem }
.mono { font-family: var(--mono) }

/* ─── active job card ─── */
.job-card {
  padding: 1rem 1.1rem;
  border-bottom: 1px solid var(--rule);
  cursor: pointer; transition: background .13s;
}
.job-card:last-child { border-bottom: 0 }
.job-card:hover { background: var(--off) }
.jc-top { display: flex; align-items: flex-start; justify-content: space-between; gap: .5rem; flex-wrap: wrap }
.jc-code { font-family: var(--mono); font-size: 1.1rem; font-weight: 800; color: var(--navy) }
.jc-desc { font-size: .73rem; color: var(--mut); margin-top: .1rem }
.jc-stats { display: flex; gap: 2rem; margin-top: .65rem; flex-wrap: wrap }
.jc-stat-n { font-family: var(--mono); font-size: 1.65rem; font-weight: 700; color: var(--navy); line-height: 1 }
.jc-stat-n.cpc { color: var(--teal) }
.jc-stat-l { font-size: .56rem; font-weight: 700; letter-spacing: .16em; text-transform: uppercase; color: var(--mut); margin-top: .12rem }
.jc-acts { display: flex; align-items: center; gap: .5rem; margin-top: .7rem; flex-wrap: wrap }
.jc-health { display: flex; gap: .3rem; flex-wrap: wrap; margin-left: auto }

/* ─── station CPC ─── */
.st-cpc { font-family: var(--mono); font-size: 1.05rem; font-weight: 700; color: var(--teal); margin: .3rem 0 .15rem; line-height: 1 }
.st-cpc-unit { font-size: .6rem; color: var(--mut); font-weight: 400 }
.st-cpc-prov { font-size: .55rem; color: var(--mut); font-style: italic }

/* ─── hero CPC inline ─── */
.hero-cpc { font-family: var(--mono); font-size: .85rem; font-weight: 600; color: var(--teal); margin-top: .3rem; text-align: right }

/* ─── CPC compare table ─── */
.cpc-tbl { width: 100%; border-collapse: collapse; font-size: .8rem }
.cpc-tbl th {
  font-size: .57rem; font-weight: 700; letter-spacing: .18em; text-transform: uppercase;
  color: var(--mut); text-align: left; padding: .45rem .75rem;
  background: var(--off); border-bottom: 1.5px solid var(--rule2); white-space: nowrap;
}
.cpc-tbl td { padding: .6rem .75rem; border-bottom: 1px solid var(--rule); vertical-align: middle }
.cpc-tbl tr:last-child td { border-bottom: 0 }
.cpc-tbl .cpc-val { font-family: var(--mono); font-size: 1rem; font-weight: 700; color: var(--teal) }
.cpc-tbl .insert-name { font-family: var(--mono); font-weight: 700; color: var(--navy) }

/* ─── shift proof ─── */
.proof-wrap { max-width: 430px; margin: 0 auto }
.proof {
  background: #fefffe; color: #0d1e26;
  border: 2px solid var(--navy); border-radius: 2px;
  padding: 1rem 1.1rem .8rem;
}
.proof-hd { display: flex; justify-content: space-between; align-items: flex-start; gap: .8rem; border-bottom: 2px solid var(--navy); padding-bottom: .6rem; margin-bottom: .6rem }
.proof-co { font-size: .68rem; font-weight: 800; letter-spacing: .12em; text-transform: uppercase; color: var(--navy) }
.proof-title { font-family: var(--mono); font-size: 1.02rem; font-weight: 800; letter-spacing: .06em; color: var(--navy); margin-top: .15rem }
.proof-date { text-align: right }
.proof-date .d { font-family: var(--mono); font-size: .78rem; font-weight: 700; color: var(--navy); margin-bottom: .3rem }
.proof-sync { font-size: .6rem; font-weight: 800; letter-spacing: .12em; padding: .22rem .5rem; border-radius: 2px; white-space: nowrap }
.proof-sync.ok   { background: #e3f2e9; color: #1d6b40; border: 1px solid #1d6b40 }
.proof-sync.warn { background: #f7ecdc; color: #8a5200; border: 1px solid #8a5200 }
.proof-sync.idle { background: var(--off2); color: var(--mut); border: 1px solid var(--rule2) }
.proof-meta { display: flex; flex-wrap: wrap; gap: .3rem 1.1rem; font-size: .78rem; padding-bottom: .55rem; border-bottom: 1px solid var(--rule); margin-bottom: .3rem }
.proof-meta b { font-size: .6rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--mut); margin-right: .3rem }
.proof-job { padding: .55rem 0; border-bottom: 1px solid var(--rule) }
.proof-job-hd { display: flex; justify-content: space-between; align-items: baseline; gap: .6rem }
.proof-job-code { font-family: var(--mono); font-size: .95rem; font-weight: 800; color: var(--navy) }
.proof-job-op { font-size: .68rem; color: var(--mut); font-weight: 600 }
.proof-job-nums { display: flex; gap: 1rem; align-items: baseline; margin-top: .2rem }
.proof-good { font-family: var(--mono); font-size: 1.35rem; font-weight: 800; color: var(--navy) }
.proof-good small, .proof-rej small { font-size: .62rem; font-weight: 600; color: var(--mut); margin-left: .15rem }
.proof-rej { font-family: var(--mono); font-size: 1.05rem; font-weight: 800; color: var(--bad) }
.proof-entries { font-size: .68rem; color: var(--mut); margin-left: auto }
.proof-reasons { font-size: .72rem; color: var(--bad); margin-top: .15rem }
.proof-station { font-size: .72rem; color: var(--T); margin-top: .18rem; font-family: var(--mono) }
.proof-empty { padding: 1.2rem 0; text-align: center; font-size: .8rem; color: var(--mut) }
.proof-totals { display: flex; gap: 0; border-bottom: 1px solid var(--rule); margin-top: .1rem }
.proof-totals .pt { flex: 1; text-align: center; padding: .55rem .2rem .45rem; border-right: 1px solid var(--rule) }
.proof-totals .pt:last-child { border-right: 0 }
.pt-n { font-family: var(--mono); font-size: 1.3rem; font-weight: 800; color: var(--navy); font-variant-numeric: tabular-nums }
.pt-n.rej { color: var(--bad) }
.pt-l { font-size: .52rem; font-weight: 700; letter-spacing: .12em; color: var(--mut); margin-top: .1rem }
.proof-ft { display: flex; align-items: center; gap: .5rem; font-size: .64rem; color: var(--mut); padding-top: .55rem }
.proof-install { margin-left: auto; font-family: var(--mono); font-size: .56rem; letter-spacing: .05em; color: var(--rule2) }
.proof-acts { display: flex; gap: .6rem; margin-top: .75rem }
.proof-acts .btn { flex: 1 }
.proof-hint { text-align: center; font-size: .68rem; color: var(--mut); margin-top: .6rem }
@media (max-width: 640px) {
  .proof { padding: .85rem .8rem .65rem }
  .proof-good { font-size: 1.55rem }
  .pt-n { font-size: 1.45rem }
}

/* ─── station mobile quick actions (phone-only; desktop keeps existing buttons) ─── */
.st-mobile-acts { display: none }

/* ─── operator performance ─── */
.perf-hero {
  display: flex; align-items: center; gap: .75rem;
  margin: .7rem 1rem .3rem;
  background: var(--teal-tint); border: 1px solid var(--teal);
  border-radius: var(--r); padding: .65rem .9rem;
}
.perf-hero-crown { font-size: 1.5rem; line-height: 1 }
.perf-hero-lbl { font-size: .58rem; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: var(--teal-d) }
.perf-hero-name { font-size: 1.05rem; font-weight: 800; color: var(--navy); margin: .12rem 0 .1rem }
.perf-hero-stat { font-size: .74rem; color: var(--T) }
.perf-list { padding: .3rem 0 }
.perf-row { display: flex; align-items: center; gap: .6rem; padding: .4rem 1rem; border-bottom: 1px solid var(--off2) }
.perf-list .perf-row:last-child { border-bottom: 0 }
.perf-rank {
  width: 20px; height: 20px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: .66rem; font-weight: 800; color: var(--mut);
  background: var(--off2); flex-shrink: 0;
}
.perf-rank.r1 { background: var(--navy); color: #fff }
.perf-rank.r2 { background: var(--teal); color: #fff }
.perf-rank.r3 { background: var(--teal-tint); color: var(--teal-d); border: 1px solid var(--teal) }
.perf-name { font-size: .8rem; font-weight: 700; color: var(--navy); min-width: 72px; flex-shrink: 0 }
.perf-bar { flex: 1; height: 7px; background: var(--off2); border-radius: 3px; overflow: hidden; min-width: 40px }
.perf-bar-fill { height: 100%; background: var(--teal); border-radius: 3px }
.perf-good { font-family: var(--mono); font-size: .8rem; font-weight: 700; color: var(--navy); min-width: 34px; text-align: right; flex-shrink: 0 }
.perf-eff { font-size: .62rem; font-weight: 800; padding: .12rem .4rem; border-radius: 2px; flex-shrink: 0; min-width: 38px; text-align: center }
.perf-eff.good { background: #e3f2e9; color: #1d6b40 }
.perf-eff.warn { background: #f7ecdc; color: #8a5200 }
.perf-eff.bad  { background: #f8e9e6; color: var(--bad) }
.perf-delta { font-size: .62rem; font-weight: 700; flex-shrink: 0; min-width: 42px; text-align: right }
.perf-delta.up { color: #1d6b40 }
.perf-delta.down { color: var(--bad) }
.perf-delta.flat { color: var(--mut) }
.perf-delta.new { color: var(--teal); letter-spacing: .06em }
@media (max-width: 640px) {
  .perf-name { min-width: 56px; font-size: .75rem }
  .perf-delta { display: none }
}

/* ─── owner dashboard ─── */
.dash-2col { display: grid; grid-template-columns: 1fr 1fr; gap: .6rem; margin-bottom: .6rem }
.dash-2col .panel { margin-bottom: 0 }
@media (max-width: 860px) { .dash-2col { grid-template-columns: 1fr } }
.att-row {
  display: flex; align-items: center; gap: .55rem;
  padding: .48rem 1rem;
  border-bottom: 1px solid var(--rule2);
  font-size: .76rem;
}
.att-row:last-child { border-bottom: 0 }
.att-row[role="button"] { cursor: pointer }
.att-row[role="button"]:hover { background: var(--off) }
.att-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0 }
.att-bad  .att-dot { background: var(--bad) }
.att-warn .att-dot { background: var(--warn) }
.att-info .att-dot { background: var(--teal) }
.att-msg { flex: 1; color: var(--T) }
.att-bad .att-msg { font-weight: 600 }
.att-arrow { color: var(--mut); font-size: .8rem }
.dash-tbl { width: 100%; border-collapse: collapse; font-size: .76rem }
.dash-tbl th { text-align: left; font-size: .6rem; font-weight: 700; letter-spacing: .1em; color: var(--mut); text-transform: uppercase; padding: .35rem .6rem; border-bottom: 1px solid var(--rule) }
.dash-tbl td { padding: .42rem .6rem; border-bottom: 1px solid var(--rule2) }
.dash-tbl tbody tr { cursor: pointer }
.dash-tbl tbody tr:hover { background: var(--off) }
.dash-tbl tr:last-child td { border-bottom: 0 }
.dash-prog { display: inline-block; width: 64px; height: 5px; background: var(--off2); border-radius: 2px; overflow: hidden; vertical-align: middle }
.dash-prog-fill { height: 100%; background: var(--teal) }
.dash-prog-lbl { font-size: .66rem; color: var(--mut); margin-left: .4rem; font-variant-numeric: tabular-nums }
.dash-st { font-size: .58rem; font-weight: 800; letter-spacing: .1em; padding: .12rem .4rem; border-radius: 2px }
.dash-st.running { color: var(--teal); background: var(--teal-tint) }
.dash-st.paused  { color: var(--warn); background: #f7ecdc }
.dash-st.behind  { color: var(--bad); background: #f8e9e6 }
.sync-dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block }
.sync-dot.ok   { background: #2e7d4f }
.sync-dot.warn { background: var(--warn) }
.sync-dot.bad  { background: var(--bad) }
.sync-dot.info { background: var(--rule2) }
.trend-bars { display: flex; align-items: flex-end; gap: .45rem; height: 78px }
.trend-col { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; height: 100% }
.trend-val { font-size: .58rem; color: var(--mut); font-variant-numeric: tabular-nums; margin-bottom: .15rem }
.trend-bar-wrap { display: flex; align-items: flex-end; width: 100% }
.trend-bar { width: 100%; background: var(--teal); border-radius: 1px 1px 0 0; position: relative; overflow: hidden }
.trend-bar-rej { position: absolute; top: 0; left: 0; right: 0; background: var(--bad) }
.trend-lbl { font-size: .56rem; font-weight: 700; letter-spacing: .08em; color: var(--mut); text-transform: uppercase; margin-top: .25rem }

/* ─── onboarding tutorial ─── */
.tut-overlay {
  position: fixed; inset: 0;
  background: rgba(1, 20, 30, .6);
  z-index: 1200;
  display: flex; align-items: center; justify-content: center;
  padding: 1rem;
}
.tut-card {
  background: var(--W);
  border-radius: 6px;
  width: 100%; max-width: 400px;
  box-shadow: 0 12px 40px rgba(0,0,0,.35);
  border-top: 4px solid var(--teal);
  overflow: hidden;
}
.tut-top { display: flex; align-items: center; justify-content: space-between; padding: .7rem .9rem .3rem }
.tut-step-n { font-family: var(--mono); font-size: .65rem; font-weight: 700; color: var(--mut); letter-spacing: .06em }
.tut-skip { background: none; border: 0; color: var(--mut); font-size: .68rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; padding: .5rem .3rem; cursor: pointer; min-height: 44px }
.tut-skip:hover { color: var(--navy) }
.tut-tap { padding: .5rem 1.6rem 1.3rem; text-align: center; cursor: pointer; user-select: none }
.tut-icon { font-size: 2.4rem; line-height: 1; margin-bottom: .8rem }
.tut-title { font-size: 1.05rem; font-weight: 800; color: var(--navy); margin-bottom: .55rem; letter-spacing: -.01em }
.tut-body { font-size: .86rem; color: var(--T); line-height: 1.55; max-width: 32ch; margin: 0 auto }
.tut-dots { display: flex; justify-content: center; gap: .35rem; padding-bottom: .9rem }
.tut-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--rule2) }
.tut-dot.on { background: var(--teal); width: 16px; border-radius: 3px }
.tut-nav { display: flex; align-items: center; justify-content: space-between; border-top: 1px solid var(--rule); padding: .5rem .5rem }
.tut-hint { font-size: .62rem; color: var(--mut); letter-spacing: .04em }
.tut-arrow {
  background: var(--off); border: 1px solid var(--rule2); color: var(--navy);
  width: 44px; height: 44px; border-radius: 50%;
  font-size: 1.1rem; font-weight: 700; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.tut-arrow:hover { background: var(--off2) }
.tut-arrow-next { background: var(--teal); border-color: var(--teal); color: #fff }
.tut-arrow-next:hover { background: var(--teal-d) }
@media (max-width: 460px) {
  .tut-hint { display: none }
}

/* ─── install nudge & sharing ─── */
.install-nudge {
  position: fixed; left: .6rem; right: .6rem; bottom: .6rem; z-index: 1050;
  background: var(--navy); color: #fff;
  border-radius: 4px; box-shadow: 0 6px 28px rgba(1,20,30,.35);
  display: flex; align-items: center; gap: .7rem;
  padding: .7rem .9rem;
  max-width: 520px; margin: 0 auto;
}
.install-nudge .in-txt { flex: 1; min-width: 0 }
.install-nudge .in-txt b { display: block; font-size: .8rem; letter-spacing: .02em }
.install-nudge .in-txt span { display: block; font-size: .68rem; color: rgba(255,255,255,.72); line-height: 1.4 }
.install-nudge .btn { min-height: 40px; padding: .5rem .9rem }
.install-nudge .in-x { background: none; border: 0; color: rgba(255,255,255,.6); font-size: 1rem; padding: .4rem; min-width: 36px; min-height: 36px }
.install-nudge .in-x:hover { color: #fff }
.btn-wa { background: #1da851; color: #fff; border-color: #1da851 }
.btn-wa:hover { background: #168f43; border-color: #168f43 }

/* ─── owner / operator mode ─── */
.mode-chip {
  border: 1px solid var(--rule2);
  background: var(--off);
  border-radius: 2px;
  font-family: inherit;
  font-size: .56rem;
  font-weight: 800;
  letter-spacing: .16em;
  padding: .32rem .6rem;
  color: var(--mut);
  cursor: pointer;
  min-height: 28px;
}
.mode-chip.owner {
  border-color: var(--teal);
  color: var(--teal);
  background: var(--teal-tint);
}
.mode-chip.operator:hover { background: var(--off2); color: var(--navy); }
.pin-overlay {
  position: fixed; inset: 0;
  background: rgba(1, 20, 30, .55);
  z-index: 1100;
  display: flex; align-items: center; justify-content: center;
  padding: 1rem;
}
.pin-card {
  background: var(--W);
  border-radius: 4px;
  padding: 1.6rem 1.4rem;
  width: 100%; max-width: 340px;
  box-shadow: 0 8px 32px rgba(0,0,0,.3);
}
.pin-title { font-weight: 800; color: var(--navy); font-size: 1rem; margin-bottom: .3rem }
.pin-sub { font-size: .75rem; color: var(--mut); margin-bottom: 1rem; line-height: 1.55 }
.pin-lbl {
  display: block;
  font-size: .6rem; font-weight: 700; letter-spacing: .16em; text-transform: uppercase;
  color: var(--mut);
  margin: .7rem 0 .3rem;
}
.pin-input {
  width: 100%;
  font-size: 1.25rem;
  letter-spacing: .35em;
  text-align: center;
  padding: .5rem .6rem;
  border: 1px solid var(--rule2);
  border-radius: 2px;
  font-family: var(--mono);
}
.pin-err { color: var(--bad); font-size: .72rem; min-height: 1rem; margin-top: .45rem; text-align: center; font-weight: 600 }
.pin-acts { display: flex; gap: .6rem; margin-top: .85rem }
.setup-pin-row { display: grid; grid-template-columns: 1fr 1fr; gap: .8rem }
.setup-pin-note { font-size: .68rem; color: var(--mut); margin: -.3rem 0 1rem; line-height: 1.5 }

/* ─── setup / first-run ─── */
.setup-split {
  display: flex;
  min-height: calc(100vh - 110px);
  margin: -1.2rem -1.4rem -6rem;
  border-top: 1px solid var(--rule);
}
.setup-brand {
  flex: 0 0 340px;
  background: oklch(0.20 0.03 228);
  color: oklch(0.88 0.012 220);
  padding: 3rem 2.2rem 2.5rem;
  display: flex;
  flex-direction: column;
  gap: 0;
}
.setup-wordmark {
  font-family: var(--mono);
  font-size: 1.45rem;
  font-weight: 800;
  letter-spacing: .18em;
  color: #fdfeff;
  margin-bottom: .3rem;
}
.setup-product-tag {
  font-size: .6rem;
  font-weight: 700;
  letter-spacing: .28em;
  text-transform: uppercase;
  color: var(--teal);
  margin-bottom: 0;
}
.setup-divider {
  height: 1px;
  background: oklch(0.32 0.025 228);
  margin: 1.75rem 0;
}
.setup-specs {
  list-style: none;
  padding: 0;
  margin: 0;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 1.65rem;
}
.setup-spec {
  display: flex;
  gap: .9rem;
  align-items: flex-start;
}
.setup-spec-n {
  font-family: var(--mono);
  font-size: .72rem;
  font-weight: 700;
  color: oklch(0.42 0.035 228);
  flex-shrink: 0;
  margin-top: .05rem;
  letter-spacing: .04em;
}
.setup-spec-lbl {
  font-size: .6rem;
  font-weight: 700;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--teal);
  margin-bottom: .28rem;
}
.setup-spec-desc {
  font-size: .78rem;
  color: oklch(0.72 0.018 222);
  line-height: 1.55;
}
.setup-trial-badge {
  margin-top: 2.5rem;
  font-size: .67rem;
  font-weight: 600;
  letter-spacing: .08em;
  color: oklch(0.40 0.025 228);
  text-transform: uppercase;
}
.setup-form-side {
  flex: 1;
  background: var(--off);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 3rem 2.5rem;
}
.setup-form-inner {
  width: 100%;
  max-width: 360px;
}
.setup-form-hd {
  font-size: 1.1rem;
  font-weight: 800;
  color: var(--navy);
  margin-bottom: .3rem;
  letter-spacing: -.01em;
}
.setup-form-sub {
  font-size: .78rem;
  color: var(--mut);
  margin-bottom: 1.8rem;
}
.setup-email-note {
  font-size: .7rem;
  font-weight: 400;
  color: var(--mut);
}
.setup-submit {
  width: 100%;
  margin-top: .5rem;
}
@media (max-width: 720px) {
  .setup-split {
    flex-direction: column;
    margin: -1.2rem -.85rem -5.5rem;
  }
  .setup-brand {
    flex: none;
    padding: 2rem 1.5rem 1.75rem;
  }
  .setup-specs { gap: 1.1rem; }
  .setup-spec-desc { font-size: .75rem; }
  .setup-trial-badge { margin-top: 1.5rem; }
  .setup-form-side {
    align-items: flex-start;
    padding: 2rem 1.5rem 3rem;
  }
}

/* ─── responsive ─── */
@media (max-width: 860px) {
  main { padding: .9rem .85rem 5.5rem }
  .bar-top { padding: .5rem .85rem .42rem }
  .hero-num { font-size: 2.4rem }
  .stat-strip { grid-template-columns: repeat(2,1fr) }
}

@media (max-width: 640px) {
  /* header */
  .bar-top { padding: .4rem .75rem .35rem; gap: .5rem }
  .bar-logo img { height: 20px }
  .bar-app { display: none }
  .bar-sep { display: none }
  .bar-clock .t { font-size: .76rem }
  .bar-clock .d { display: none }
  .bar-crumb { max-width: 160px }
  .crumb-back { min-height: 40px; padding: .4rem .65rem }

  /* trial bar */
  .trial-bar { padding: .4rem .75rem; flex-wrap: wrap; gap: .4rem }

  /* layout */
  main { padding: .65rem .65rem 5rem }
  .panel-bd { padding: .65rem .7rem }
  .panel-hd { padding: .5rem .7rem .44rem; gap: .5rem }

  /* touch targets — 44px minimum for all interactive elements */
  .btn { min-height: 44px; font-size: .64rem }
  .btn-lg { min-height: 52px }
  .tabs { padding: 0 .5rem }
  .tab { padding: .58rem .65rem .52rem; min-height: 42px }

  /* prevent iOS auto-zoom (font < 16px triggers zoom on tap), exclude qty-inp which has its own size */
  .field input:not(.qty-inp), .field select { min-height: 44px; font-size: 1rem !important; padding: .58rem .65rem }
  .field textarea { font-size: 1rem !important; padding: .58rem .65rem }

  /* forms */
  .fgrid { grid-template-columns: 1fr !important }

  /* qty input — large thumb target, full width, hero prominence */
  .qty-row { flex-wrap: wrap !important; gap: .5rem !important; align-items: flex-start }
  .qty-row > div { flex: 1 }
  .qty-inp { width: 100% !important; min-height: 72px !important; font-size: 2.8rem !important; border-radius: 4px }
  .qty-adj { min-height: 46px; font-size: .82rem; padding: .55rem; width: 100% }

  /* tooling event rows */
  .ev-station-row { grid-template-columns: 1fr; gap: .4rem }

  /* log form */
  .log-form-hd { padding: .52rem .7rem .46rem }
  .log-form-bd { padding: .7rem .7rem .8rem }

  /* job hero */
  .job-hero { padding: .85rem .75rem .7rem }
  .hero-top { gap: .7rem }
  .hero-code { font-size: 1.2rem }
  .hero-num { font-size: 2rem }
  .hero-acts { gap: .4rem; margin-top: .65rem; flex-wrap: wrap }

  /* job list */
  .jobs-hd { flex-wrap: wrap; gap: .5rem; margin-bottom: .65rem }
  .jobs-hd h2 { font-size: .95rem }
  .job-row { padding: .65rem .7rem }
  .job-card { padding: .85rem .8rem }
  .jc-stats { gap: 1.1rem; margin-top: .5rem }
  .jc-stat-n { font-size: 1.3rem }
  .jc-acts { gap: .4rem; flex-wrap: wrap }
  .jc-acts .btn { flex: 1; min-width: 110px }

  /* station tiles — slightly narrower but horizontal scroll intact */
  .station-tile { width: 146px }
  .station-scroll { padding: .7rem .7rem .8rem; gap: .5rem }

  /* tables */
  .corner-tbl th, .corner-tbl td { padding: .4rem .55rem; font-size: .73rem }
  .log-tbl th, .log-tbl td { padding: .42rem .5rem }
  .log-tbl td { font-size: .73rem }

  /* stat strip */
  .stat-strip { grid-template-columns: 1fr 1fr }
  .s-val { font-size: 1.2rem }
  .s-sub { font-size: .58rem }
  .s-stat { padding: .6rem .7rem .5rem }

  /* paywall */
  .paywall-wrap { padding: 1.2rem .65rem }
  .paywall-card { padding: 1.6rem 1.1rem }
  .paywall-title { font-size: 1.05rem }
  .paywall-sub { font-size: .77rem; margin-bottom: 1.1rem }
  .paywall-price { font-size: 1.35rem }

  /* touch targets — newer components */
  .tab { min-height: 44px }
  .btn-icon-sm { min-width: 44px; min-height: 44px; font-size: 1rem }
  .mode-chip { min-height: 44px; padding: .5rem .7rem }
  .att-row { min-height: 44px; padding: .55rem 1rem }
  .op-step { padding: .55rem .8rem; min-width: 92px }
  .op-step-name { font-size: .88rem }
  .inp { min-height: 44px; font-size: 1rem !important }
  /* station panel-header buttons carry inline 28px sizing — override for thumbs */
  .panel-hd .btn { min-height: 44px !important; font-size: .6rem !important; padding: .5rem .75rem !important }

  /* station screen — big three actions (hidden on desktop) */
  .st-mobile-acts { display: grid; grid-template-columns: 1fr 1fr; gap: .55rem; margin-bottom: .65rem }
  .st-mobile-acts .btn { min-height: 54px; font-size: .68rem }
  .st-mobile-acts .btn-teal { grid-column: 1 / -1 }

  /* tables — smooth horizontal scroll, frozen first column, no font shrink */
  .log-tbl-wrap, .inv-tbl-wrap { -webkit-overflow-scrolling: touch }
  .inv-tbl { display: block; overflow-x: auto; -webkit-overflow-scrolling: touch }
  .inv-tbl th, .inv-tbl td { white-space: nowrap }
  .log-tbl th:first-child, .log-tbl td:first-child,
  .dash-tbl th:first-child, .dash-tbl td:first-child {
    position: sticky; left: 0; background: var(--W); z-index: 1;
  }
  .dash-tbl tbody tr:hover td:first-child { background: var(--off) }
  .dash-tbl td { padding: .6rem .6rem }
  .dash-tbl tbody tr { min-height: 44px }

  /* button spacing — roomier gaps between adjacent actions */
  .hero-acts { gap: .55rem }
  .jc-acts { gap: .55rem }
  .pin-acts { gap: .7rem }
}

@media (max-width: 390px) {
  .bar-clock { display: none }
  main { padding: .6rem .5rem 5rem }
  .hero-num { font-size: 1.75rem }
  .jc-stat-n { font-size: 1.1rem }
  .station-tile { width: 132px }
  .qty-inp { font-size: 2.4rem; min-height: 64px }
}
</style>
